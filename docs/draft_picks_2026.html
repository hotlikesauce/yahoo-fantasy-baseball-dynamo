<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x26be;</text></svg>">
<link rel="stylesheet" href="common.css">
<title>Summertime Sadness - 2027 Draft Capital</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  .chart-box { height: 450px; }

  .grid-table { overflow-x: auto; margin-bottom: 24px; }
  .grid-table table { min-width: 900px; }
  .grid-table th { font-size: 0.72em; padding: 8px 4px; text-align: center; min-width: 32px; }
  .grid-table th:first-child { text-align: left; min-width: 180px; }
  .grid-table th.keeper { color: #475569; font-style: italic; }
  .grid-table td { text-align: center; padding: 6px 4px; font-size: 0.85em; font-weight: 600; }
  .team-cell { text-align: left !important; white-space: nowrap; font-weight: 500 !important; }
  .cell-zero  { background: #ef444422; color: #ef4444; }
  .cell-one   { color: #64748b; }
  .cell-two   { background: #4ade8018; color: #4ade80; }
  .cell-three { background: #22c55e44; color: #4ade80; font-weight: 800; text-shadow: 0 0 6px #22c55e66; }
  .total-cell   { font-weight: 700; color: #e2e8f0; }
  .capital-cell { font-weight: 700; color: #34d399; }
  .pos  { color: #22c55e; font-weight: 700; }
  .neg  { color: #ef4444; font-weight: 700; }
  .even { color: #64748b; }
  .notes { font-size: 0.82em; }
  .note-extra   { color: #22c55e; }
  .note-missing { color: #ef4444; opacity: 0.7; }

  th.sortable { cursor: pointer; user-select: none; position: relative; padding-right: 14px; }
  th.sortable:hover { color: #e2e8f0; }
  th.sortable::after { content: '\2195'; position: absolute; right: 2px; opacity: 0.3; font-size: 0.8em; }
  th.sortable.asc::after  { content: '\2191'; opacity: 0.8; }
  th.sortable.desc::after { content: '\2193'; opacity: 0.8; }

  .loading { text-align: center; color: #64748b; padding: 60px 0; }
  #generated-at { text-align: center; color: #475569; font-size: 0.8em; margin-bottom: 16px; }
</style>
</head>
<body>
<div id="nav"></div>
<script src="nav.js"></script>
<div class="container">
<h1>Summertime Sadness Fantasy Baseball</h1>
<p class="page-subtitle">2027 Draft Capital</p>
<p class="section-desc" style="color:#64748b;margin-bottom:8px;">Current pick ownership. Pick value uses exponential decay &mdash; picks within a round are distributed equally since draft order is not yet set.</p>
<div id="generated-at"></div>
<div id="content"><div class="loading">Loading draft capital data&hellip;</div></div>
</div>

<script>
const DATA_URL = 'data/draft_capital_2026.json';

async function load() {
  let d;
  try {
    const resp = await fetch(DATA_URL);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    d = await resp.json();
  } catch (e) {
    document.getElementById('content').innerHTML =
      '<p style="color:#ef4444;text-align:center">Failed to load draft capital data: ' + e.message + '</p>';
    return;
  }

  if (d.generated) {
    document.getElementById('generated-at').textContent =
      'Data as of: ' + new Date(d.generated).toLocaleString();
  }

  const teams = d.teams;
  const STD   = d.standardCapital;
  const KR    = d.keeperRounds;
  const TR    = d.totalRounds;
  const pv    = d.pickValues;

  let html = '';

  // Pick value description
  html += `<p class="section-desc">Each pick is weighted by exponential decay (2% per slot).
    Pick 1 (R${KR+1}P1) = ${pv.p1} pts, Pick 12 (R${KR+1}P12) = ${pv.p12} pts,
    Pick 49 (R7P1) = ${pv.p49} pts, Pick ${(TR-KR)*12} (R${TR}P12) = ${pv.p240} pts.
    Standard (avg) = ${STD} pts.</p>`;

  // Bar chart
  html += `<h3>Draft Capital Rankings</h3>
<div class="chart-box"><canvas id="capitalChart"></canvas></div>`;

  // Summary table
  html += `<h3>Draft Capital Summary</h3>
<table id="summaryTable">
<thead><tr>
  <th class="sortable" data-type="num">#</th>
  <th class="sortable" data-type="str">Team</th>
  <th class="sortable" data-type="num">Capital</th>
  <th class="sortable" data-type="num">vs Avg</th>
  <th class="sortable" data-type="num">Total Picks</th>
  <th class="sortable" data-type="num">Bonus R1-10</th>
  <th class="sortable" data-type="num">Rounds Empty</th>
  <th>Notable</th>
</tr></thead>
<tbody>`;

  teams.forEach((t, i) => {
    const diffStr = t.capitalVsStd > 0 ? '+' + t.capitalVsStd : String(t.capitalVsStd);
    const diffCls = t.capitalVsStd > 0 ? 'pos' : t.capitalVsStd < 0 ? 'neg' : 'even';
    const notable = [], missing = [];
    t.picks.forEach((count, ri) => {
      if (count >= 3) notable.push(count + 'x R' + (ri+1));
      else if (count === 2 && ri < 10) notable.push('2x R' + (ri+1));
      if (count === 0 && ri < 15) missing.push('R' + (ri+1));
    });
    let noteHtml = '';
    if (notable.length) noteHtml += '<span class="note-extra">' + notable.join(', ') + '</span>';
    if (missing.length) noteHtml += ' <span class="note-missing">No ' + missing.join(', ') + '</span>';
    html += `<tr>
      <td class="rank">${i+1}</td>
      <td><span style="color:${t.color}">&#9679;</span> ${t.name}</td>
      <td class="capital-cell">${t.capital}</td>
      <td class="${diffCls}">${diffStr}</td>
      <td>${t.totalPicks}</td>
      <td>${t.extraHigh}</td>
      <td>${t.tradedAway}</td>
      <td class="notes">${noteHtml}</td>
    </tr>`;
  });
  html += '</tbody></table>';

  // Grid table
  const roundHeaders = Array.from({length: TR}, (_, i) =>
    '<th' + (i < KR ? ' class="keeper"' : '') + '>R' + (i+1) + '</th>').join('');
  html += `<h3>Pick Grid</h3>
<p class="section-desc">Number of picks each team holds per round. R1-R${KR} are keeper rounds (not tradeable).
<span class="cell-zero" style="padding:2px 6px;border-radius:4px">0 = traded away</span> &nbsp;
<span style="color:#64748b">1 = standard</span> &nbsp;
<span class="cell-two" style="padding:2px 6px;border-radius:4px">2 = extra</span> &nbsp;
<span class="cell-three" style="padding:2px 6px;border-radius:4px">3+ = stockpiled</span></p>
<div class="grid-table"><table id="gridTable">
<thead><tr><th>Team</th>${roundHeaders}<th>Total</th><th>Capital</th><th>+/-</th></tr></thead>
<tbody>`;

  teams.forEach(t => {
    const diffStr = t.capitalVsStd > 0 ? '+' + t.capitalVsStd : String(t.capitalVsStd);
    const diffCls = t.capitalVsStd > 0 ? 'pos' : t.capitalVsStd < 0 ? 'neg' : 'even';
    const cells = t.picks.map(c => {
      const cls = c === 0 ? 'cell-zero' : c === 1 ? 'cell-one' : c === 2 ? 'cell-two' : 'cell-three';
      return '<td class="' + cls + '">' + c + '</td>';
    }).join('');
    html += `<tr>
      <td class="team-cell"><span style="color:${t.color}">&#9679;</span> ${t.name}</td>
      ${cells}
      <td class="total-cell">${t.totalPicks}</td>
      <td class="capital-cell">${t.capital}</td>
      <td class="${diffCls}">${diffStr}</td>
    </tr>`;
  });
  html += '</tbody></table></div>';

  document.getElementById('content').innerHTML = html;

  // Bar chart
  new Chart(document.getElementById('capitalChart').getContext('2d'), {
    type: 'bar',
    data: {
      labels: teams.map(t => t.name),
      datasets: [{
        label: 'Draft Capital',
        data: teams.map(t => t.capital),
        backgroundColor: teams.map(t => t.color),
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      indexAxis: 'y',
      layout: { padding: { top: 20, right: 20 } },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1e293b', titleColor: '#e2e8f0', bodyColor: '#94a3b8',
          borderColor: '#475569', borderWidth: 1,
          callbacks: {
            label: ctx => {
              const val = ctx.parsed.x;
              const diff = val - STD;
              return 'Capital: ' + val + ' (' + (diff >= 0 ? '+' : '') + diff + ' vs avg)';
            }
          }
        }
      },
      scales: {
        x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' },
             title: { display: true, text: 'Draft Capital Points', color: '#64748b' } },
        y: { ticks: { color: '#e2e8f0', font: { size: 11 } }, grid: { display: false } }
      }
    },
    plugins: [{
      id: 'avgLine',
      afterDraw(chart) {
        const { ctx, scales: { x, y } } = chart;
        const px = x.getPixelForValue(STD);
        ctx.save();
        ctx.strokeStyle = '#94a3b866'; ctx.lineWidth = 2; ctx.setLineDash([6, 4]);
        ctx.beginPath(); ctx.moveTo(px, y.top); ctx.lineTo(px, y.bottom); ctx.stroke();
        ctx.fillStyle = '#94a3b8'; ctx.font = '10px Segoe UI';
        ctx.textAlign = 'center'; ctx.fillText('Avg (' + STD + ')', px, y.top - 6);
        ctx.restore();
      }
    }]
  });

  // Sortable tables
  document.querySelectorAll('th.sortable').forEach(th => {
    th.addEventListener('click', () => {
      const tbl = th.closest('table');
      const idx = Array.from(th.parentElement.children).indexOf(th);
      const rows = Array.from(tbl.querySelectorAll('tbody tr'));
      const type = th.dataset.type || 'str';
      const isAsc = th.classList.contains('asc');
      th.parentElement.querySelectorAll('th').forEach(h => h.classList.remove('asc', 'desc'));
      th.classList.add(isAsc ? 'desc' : 'asc');
      const getVal = (row, i) => {
        const text = row.children[i] ? row.children[i].textContent.trim() : '';
        if (type === 'num') return parseFloat(text.replace(/[+#]/g, '')) || 0;
        return text.toLowerCase();
      };
      rows.sort((a, b) => {
        const va = getVal(a, idx), vb = getVal(b, idx);
        const cmp = typeof va === 'string' ? va.localeCompare(vb) : va - vb;
        return isAsc ? -cmp : cmp;
      });
      const tbody = tbl.querySelector('tbody');
      rows.forEach(r => tbody.appendChild(r));
    });
  });
}

load();
</script>
</body>
</html>
