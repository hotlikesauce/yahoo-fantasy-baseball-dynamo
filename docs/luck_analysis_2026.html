<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x26be;</text></svg>">
<link rel="stylesheet" href="common.css">
<title>Summertime Sadness - 2026 Luck & Matchup Analysis</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  .year { color: #a78bfa; font-weight: 600; }
  .lucky { color: #22c55e; font-weight: 700; }
  .unlucky { color: #ef4444; font-weight: 700; }
  .close-margin { color: #f59e0b; font-weight: 700; }
  .lucky-highlight td { background: #22c55e15; }
  .unlucky-highlight td { background: #ef444415; }
  .upset-highlight td { background: #f59e0b12; }
  .upset-tag { background: #f59e0b; color: #0f172a; font-size: 0.7em; font-weight: 800; padding: 2px 6px; border-radius: 4px; letter-spacing: 0.05em; }
  .score { color: #e2e8f0; font-weight: 600; }
  .weekly-table { max-height: 700px; overflow-y: auto; margin-bottom: 24px; }
  .weekly-table table { margin-bottom: 0; }
  .weekly-table th { position: sticky; top: 0; background: #0f172a; z-index: 1; }
  .loading-msg { text-align: center; color: #64748b; padding: 60px 0; font-size: 1.1em; }
  .error-msg { text-align: center; color: #ef4444; padding: 40px; background: #1e293b; border-radius: 12px; margin: 20px 0; }
  #last-updated { color: #475569; font-size: 0.8em; text-align: center; margin-bottom: 8px; }
</style>
</head>
<body>
<div id="nav"></div>
<script src="nav.js"></script>
<div class="container">
<h1>Summertime Sadness Fantasy Baseball</h1>
<p class="page-subtitle">2026 Luck &amp; Matchup Analysis</p>
<div id="last-updated"></div>
<div id="content"><div class="loading-msg">Loading luck analysis...</div></div>
</div>

<script>
// =====================================================
// CONFIG - Set your Lambda Function URL here
// =====================================================
const API_URL = 'https://72yvkwushvgvc4qpdh7ijndcbu0rgilv.lambda-url.us-west-2.on.aws/';

// =====================================================
// Sortable helper
// =====================================================
function initSortable(tbl) {
  if (!tbl) return;
  tbl.querySelectorAll('th.sortable').forEach(th => {
    th.addEventListener('click', () => {
      const col = parseInt(th.dataset.col);
      const type = th.dataset.type || 'str';
      const isAsc = th.classList.contains('asc');
      tbl.querySelectorAll('th').forEach(h => h.classList.remove('asc', 'desc'));
      th.classList.add(isAsc ? 'desc' : 'asc');
      const tbody = tbl.querySelector('tbody');
      const rows = Array.from(tbody.querySelectorAll('tr'));
      rows.sort((a, b) => {
        const ta = a.children[col].textContent.trim();
        const tb = b.children[col].textContent.trim();
        let va, vb;
        if (type === 'num') { va = parseFloat(ta.replace(/[+#↑↓—]/g, '')) || 0; vb = parseFloat(tb.replace(/[+#↑↓—]/g, '')) || 0; }
        else if (type === 'wlt') { va = parseInt(ta.split('-')[0]) || 0; vb = parseInt(tb.split('-')[0]) || 0; }
        else { va = ta.toLowerCase(); vb = tb.toLowerCase(); }
        const cmp = typeof va === 'string' ? va.localeCompare(vb) : va - vb;
        return isAsc ? -cmp : cmp;
      });
      rows.forEach(r => tbody.appendChild(r));
    });
  });
}

function th(label, col, type) {
  return `<th class="sortable" data-col="${col}" data-type="${type}">${label}</th>`;
}

function fmtWlt(w, l, t) {
  let s = `${w}-${l}`;
  if (t > 0) s += `-${t}`;
  return s;
}

// =====================================================
// Load & Render
// =====================================================
async function load() {
  try {
    const resp = await fetch(API_URL);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const d = await resp.json();

    if (d.error && (!d.teamSummary || !d.teamSummary.length)) {
      document.getElementById('content').innerHTML = `<div class="error-msg">${d.error}</div>`;
      return;
    }

    if (d.timestamp) {
      document.getElementById('last-updated').textContent = 'Updated: ' + new Date(d.timestamp).toLocaleString();
    }

    render(d);
  } catch (e) {
    document.getElementById('content').innerHTML =
      `<div class="error-msg">Failed to load luck analysis.<br><br><code>${e.message}</code><br><br>Make sure <strong>API_URL</strong> is set to your Lambda Function URL.</div>`;
  }
}

function render(d) {
  const { teamSummary, weeklyBreakdown, matchupXwins, blowouts, closest,
          bestMatchups, worstMatchups, scheduleStrength, colorMap } = d;

  let html = '';

  // Luck table
  html += `
<h3>Luck Score</h3>
<p class="section-desc">xWins = expected category wins based on how your stats ranked against every opponent that week. Luck Score = actual category wins minus xWins. <span class="lucky">&#x2191; Lucky Win</span> = won your matchup despite lower xWins than your opponent. <span class="unlucky">&#x2193; Unlucky Loss</span> = lost despite higher xWins.</p>
<table id="luckTable">
<thead><tr>
  ${th('#','0','num')}${th('Team','1','str')}${th('Matchup W-L-T','2','wlt')}
  ${th('Cat Wins','3','num')}${th('xWins','4','num')}${th('Luck Score','5','num')}
  ${th('Lucky W','6','num')}${th('Unlucky L','7','num')}
</tr></thead>
<tbody id="luckBody"></tbody>
</table>
<div class="chart-box-tall"><canvas id="luckChart"></canvas></div>`;

  // Recent form predictor
  html += `
<h3>Recent Form</h3>
<p class="section-desc">Ranked by last week's xWins — a leading indicator for this week's matchup. <strong>Trend</strong> = last week vs season average. Teams running hot are likely to carry that into the current week.</p>
<table id="formTable">
<thead><tr>
  ${th('#','0','num')}${th('Team','1','str')}${th('Last Wk xWins','2','num')}${th('Season Avg','3','num')}${th('Trend','4','num')}${th('Last Wk Result','5','str')}
</tr></thead>
<tbody id="formBody"></tbody>
</table>`;

  // Weekly breakdown
  html += `
<h3>Weekly Breakdown</h3>
<p class="section-desc">Every matchup by week. <span style="background:#22c55e15;padding:2px 6px;border-radius:4px;">Green</span> = lucky win (won despite lower xWins). <span style="background:#ef444415;padding:2px 6px;border-radius:4px;">Red</span> = unlucky loss (lost despite higher xWins).</p>
<div class="weekly-table">
<table id="weeklyTable">
<thead><tr>${th('Week','0','num')}${th('Team','1','str')}${th('xWins','2','num')}${th('Opp xWins','3','num')}${th('Result','4','wlt')}${th('Opponent','5','str')}<th></th></tr></thead>
<tbody id="weeklyBody"></tbody>
</table>
</div>`;

  // Matchup xWins
  html += `
<h3>Matchup xWins vs Actual</h3>
<p class="section-desc">Both teams' xWins side-by-side with the actual result. <span class="upset-tag">UPSET</span> = winner had lower xWins than their opponent.</p>
<div class="weekly-table">
<table id="matchupXwTable">
<thead><tr>${th('Week','0','num')}${th('Winner','1','str')}${th('W xWins','2','num')}${th('Score','3','wlt')}${th('Loser','4','str')}${th('L xWins','5','num')}<th></th></tr></thead>
<tbody id="matchupXwBody"></tbody>
</table>
</div>`;

  // Blowouts & Closest
  html += `
<div class="two-col">
<div>
<h3>Biggest Blowouts</h3>
<table id="blowoutTable">
<thead><tr>${th('#','0','num')}${th('Week','1','num')}${th('Winner','2','str')}${th('Score','3','wlt')}${th('Loser','4','str')}</tr></thead>
<tbody id="blowoutBody"></tbody>
</table>
</div>
<div>
<h3>Closest Matchups</h3>
<table id="closestTable">
<thead><tr>${th('#','0','num')}${th('Week','1','num')}${th('Winner','2','str')}${th('Score','3','wlt')}${th('Loser','4','str')}</tr></thead>
<tbody id="closestBody"></tbody>
</table>
</div>
</div>`;

  // Best/Worst matchups
  const mqCols = `${th('#','0','num')}${th('Week','1','num')}${th('Winner','2','str')}${th('Loser','3','str')}${th('Score','4','wlt')}${th('W xWins','5','num')}${th('L xWins','6','num')}`;
  html += `
<h3>Best Matchups of the Year</h3>
<p class="section-desc">Combined xWins = sum of both teams' xWins that week. Higher = two strong teams going at it.</p>
<table id="bestMqTable">
<thead><tr>${mqCols}${th('Combined','7','num')}</tr></thead>
<tbody id="bestMqBody"></tbody>
</table>
<h3>Worst Matchups of the Year</h3>
<p class="section-desc">The toilet bowl games — lowest combined xWins.</p>
<table id="worstMqTable">
<thead><tr>${mqCols}${th('Combined','7','num')}</tr></thead>
<tbody id="worstMqBody"></tbody>
</table>`;

  // Schedule strength
  html += `
<h3>Schedule Strength</h3>
<p class="section-desc">How tough were your opponents? Avg Opp xWins = average expected category wins of the teams you faced. Higher = harder schedule.</p>
<table id="schedTable">
<thead><tr>${th('#','0','num')}${th('Team','1','str')}${th('Avg Opp xWins','2','num')}${th('Cat Wins','3','num')}${th('xWins','4','num')}${th('Luck Score','5','num')}</tr></thead>
<tbody id="schedBody"></tbody>
</table>`;

  document.getElementById('content').innerHTML = html;

  // Luck table — count lucky/unlucky from weeklyBreakdown
  const luckyWins = {}, unluckyL = {};
  weeklyBreakdown.forEach(e => {
    if (e.luck_tag === 'lucky_win') luckyWins[e.tn] = (luckyWins[e.tn] || 0) + 1;
    if (e.luck_tag === 'unlucky_loss') unluckyL[e.tn] = (unluckyL[e.tn] || 0) + 1;
  });

  // Recent form predictor
  const allWeeks = [...new Set(weeklyBreakdown.map(e => e.week))].sort((a, b) => a - b);
  const lastWeek = allWeeks[allWeeks.length - 1];
  const formRows = [];
  const tnSet = [...new Set(weeklyBreakdown.map(e => e.tn))];
  tnSet.forEach(tn => {
    const entries = weeklyBreakdown.filter(e => e.tn === tn).sort((a, b) => a.week - b.week);
    const lastEntry = entries.find(e => e.week === lastWeek);
    if (!lastEntry) return;
    const seasonAvg = entries.reduce((sum, e) => sum + (e.xw_cats || 0), 0) / entries.length;
    const trend = (lastEntry.xw_cats || 0) - seasonAvg;
    formRows.push({ tn, lastEntry, seasonAvg, trend });
  });
  formRows.sort((a, b) => (b.lastEntry.xw_cats || 0) - (a.lastEntry.xw_cats || 0));

  const formBody = document.getElementById('formBody');
  formRows.forEach((row, i) => {
    const { lastEntry, seasonAvg, trend } = row;
    const color = colorMap && colorMap[row.tn] ? colorMap[row.tn] : '#94a3b8';
    const trendStr = trend > 0 ? `<span class="lucky">▲ +${trend.toFixed(1)}</span>` : trend < 0 ? `<span class="unlucky">▼ ${trend.toFixed(1)}</span>` : '<span style="color:#64748b">— 0.0</span>';
    const resultStr = lastEntry.won ? `<span class="lucky">W ${lastEntry.cats_w}-${lastEntry.cats_l}</span>` : `<span class="unlucky">L ${lastEntry.cats_w}-${lastEntry.cats_l}</span>`;
    const luckIcon = lastEntry.luck_tag === 'lucky_win' ? ' <span class="lucky" title="Lucky Win">↑</span>' : lastEntry.luck_tag === 'unlucky_loss' ? ' <span class="unlucky" title="Unlucky Loss">↓</span>' : '';
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="rank">${i+1}</td><td><span style="color:${color}">&#9679;</span> ${lastEntry.name}</td><td class="lucky">${(lastEntry.xw_cats||0).toFixed(1)}</td><td style="color:#94a3b8">${seasonAvg.toFixed(1)}</td><td>${trendStr}</td><td>${resultStr}${luckIcon} vs ${lastEntry.opp_name}</td>`;
    formBody.appendChild(tr);
  });
  initSortable(document.getElementById('formTable'));

  const luckBody = document.getElementById('luckBody');
  teamSummary.forEach((s, i) => {
    const mRecord = fmtWlt(s.matchup_w, s.matchup_l, s.matchup_t);
    const luckClass = s.cum_luck > 0 ? 'lucky' : s.cum_luck < 0 ? 'unlucky' : '';
    const luckStr = s.cum_luck != null ? (s.cum_luck > 0 ? '+' + s.cum_luck.toFixed(1) : s.cum_luck.toFixed(1)) : '—';
    const lw = luckyWins[s.tn] || 0;
    const ul = unluckyL[s.tn] || 0;
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="rank">${i+1}</td><td><span style="color:${s.color}">&#9679;</span> ${s.name}</td><td>${mRecord}</td><td>${s.actual_cats}</td><td>${s.xwins_cats != null ? s.xwins_cats.toFixed(1) : '—'}</td><td class="${luckClass}">${luckStr}</td><td class="lucky">${lw}</td><td class="unlucky">${ul}</td>`;
    luckBody.appendChild(tr);
  });

  // Weekly breakdown
  const weeklyBody = document.getElementById('weeklyBody');
  weeklyBreakdown.forEach(entry => {
    const resultStr = (entry.won ? 'W' : 'L') + ' ' + entry.cats_w + '-' + entry.cats_l;
    const resultClass = entry.won ? 'lucky' : 'unlucky';
    let rowClass = '';
    let luckIcon = '';
    if (entry.luck_tag === 'lucky_win') { rowClass = 'lucky-highlight'; luckIcon = '<span class="lucky">&#x2191;</span>'; }
    else if (entry.luck_tag === 'unlucky_loss') { rowClass = 'unlucky-highlight'; luckIcon = '<span class="unlucky">&#x2193;</span>'; }
    const color = colorMap && colorMap[entry.tn] ? colorMap[entry.tn] : '#94a3b8';
    const opp = entry.opp_name.length > 22 ? entry.opp_name.slice(0, 22) : entry.opp_name;
    const tr = document.createElement('tr');
    if (rowClass) tr.className = rowClass;
    tr.innerHTML = `<td class="year">Wk ${entry.week}</td><td><span style="color:${color}">&#9679;</span> ${entry.name}</td><td class="lucky">${entry.xw_cats != null ? entry.xw_cats.toFixed(1) : '—'}</td><td class="unlucky">${entry.opp_xw != null ? entry.opp_xw.toFixed(1) : '—'}</td><td class="${resultClass}">${resultStr}</td><td>vs ${opp}</td><td>${luckIcon}</td>`;
    weeklyBody.appendChild(tr);
  });

  // Matchup xWins
  if (matchupXwins && matchupXwins.length) {
    const mxBody = document.getElementById('matchupXwBody');
    matchupXwins.forEach(m => {
      const wc = colorMap && colorMap[m.winner_tn] ? colorMap[m.winner_tn] : '#94a3b8';
      const lc = colorMap && colorMap[m.loser_tn] ? colorMap[m.loser_tn] : '#94a3b8';
      const upsetTag = m.upset ? '<span class="upset-tag">UPSET</span>' : '';
      const tr = document.createElement('tr');
      if (m.upset) tr.className = 'upset-highlight';
      tr.innerHTML = `<td class="year">Wk ${m.week}</td><td><span style="color:${wc}">&#9679;</span> ${m.winner}</td><td class="lucky">${m.w_xw.toFixed(1)}</td><td class="score">${m.score}</td><td><span style="color:${lc}">&#9679;</span> ${m.loser}</td><td class="unlucky">${m.l_xw.toFixed(1)}</td><td>${upsetTag}</td>`;
      mxBody.appendChild(tr);
    });
    initSortable(document.getElementById('matchupXwTable'));
  }

  // Blowouts & closest
  [['blowoutBody', blowouts], ['closestBody', closest]].forEach(([id, list]) => {
    const tbody = document.getElementById(id);
    list.forEach((m, i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td class="rank">${i+1}</td><td class="year">Wk ${m.week}</td><td>${m.winner}</td><td class="lucky">${m.w_cats}-${m.l_cats}</td><td>${m.loser}</td>`;
      tbody.appendChild(tr);
    });
  });

  // Best/worst matchups
  [['bestMqBody', bestMatchups, 'lucky'], ['worstMqBody', worstMatchups, 'unlucky']].forEach(([id, list, cls]) => {
    const tbody = document.getElementById(id);
    list.forEach((m, i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td class="rank">${i+1}</td><td class="year">Wk ${m.week}</td><td>${m.winner}</td><td>${m.loser}</td><td class="score">${m.score}</td><td>${m.w_xw}</td><td>${m.l_xw}</td><td class="${cls}">${m.combined}</td>`;
      tbody.appendChild(tr);
    });
  });

  // Schedule strength
  const schedBody = document.getElementById('schedBody');
  scheduleStrength.forEach((s, i) => {
    const luckClass = s.cum_luck > 0 ? 'lucky' : 'unlucky';
    const luckStr = s.cum_luck != null ? (s.cum_luck > 0 ? '+' + s.cum_luck.toFixed(1) : s.cum_luck.toFixed(1)) : '—';
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="rank">${i+1}</td><td><span style="color:${s.color}">&#9679;</span> ${s.name}</td><td>${s.avg_opp_xw.toFixed(3)}</td><td>${s.actual_cats}</td><td>${s.xwins_cats != null ? s.xwins_cats.toFixed(1) : '—'}</td><td class="${luckClass}">${luckStr}</td>`;
    schedBody.appendChild(tr);
  });

  // Luck bar chart
  const luckLabels = teamSummary.map(s => s.name);
  const luckValues = teamSummary.map(s => s.cum_luck);
  const luckColors = teamSummary.map(s => s.cum_luck > 0 ? '#22c55e' : '#ef4444');
  new Chart(document.getElementById('luckChart'), {
    type: 'bar',
    data: { labels: luckLabels, datasets: [{ label: 'Luck Score', data: luckValues, backgroundColor: luckColors, borderRadius: 4 }] },
    options: {
      responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: {
        legend: { display: false },
        tooltip: { backgroundColor: '#1e293b', titleColor: '#e2e8f0', bodyColor: '#94a3b8', borderColor: '#475569', borderWidth: 1,
          callbacks: { label: ctx => 'Luck Score: ' + (ctx.parsed.x > 0 ? '+' : '') + ctx.parsed.x.toFixed(1) } }
      },
      scales: {
        x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' }, title: { display: true, text: 'Luck Score (Actual Cat Wins − xWins)', color: '#64748b' } },
        y: { ticks: { color: '#e2e8f0', font: { size: 11 } }, grid: { display: false } }
      }
    }
  });

  ['luckTable', 'formTable', 'weeklyTable', 'blowoutTable', 'closestTable', 'bestMqTable', 'worstMqTable', 'schedTable'].forEach(id => {
    initSortable(document.getElementById(id));
  });
}

load();
</script>
</body>
</html>
